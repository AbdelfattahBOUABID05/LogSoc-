stages:
  - build
  - test
  # - deploy

# Configuration par défaut pour tous les jobs
default:
  services:
    - docker:24.0.5-dind

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  # Chemins des images dans la GitLab Registry
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_REF_SLUG
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_REF_SLUG
  # Chemins pour le cache
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

# --- Build Stage ---
# Construction et Push des images vers la GitLab Registry
build_images:
  stage: build
  image: docker:24.0.5
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    # Build Backend
    - docker build --pull -t $BACKEND_IMAGE ./backend
    - docker push $BACKEND_IMAGE
    # Build Frontend
    - docker build --pull -t $FRONTEND_IMAGE ./frontend
    - docker push $FRONTEND_IMAGE

# --- Test Stage ---
# Tests Unitaires Python (Backend)
test_backend:
  stage: test
  image: python:3.11-slim
  cache:
    key: backend-cache
    paths:
      - .cache/pip
  script:
    - cd backend
    - pip install --cache-dir $PIP_CACHE_DIR -r requirements.txt
    - pytest || echo "Certains tests ont échoué, mais on continue le pipeline."

# Tests Unitaires Angular (Frontend)
test_frontend:
  stage: test
  image: node:18-alpine
  cache:
    key: frontend-cache
    paths:
      - frontend/.npm
      - frontend/node_modules
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npm test -- --watch=false --browsers=ChromeHeadless || echo "Tests frontend ignorés."

