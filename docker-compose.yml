services:
  # Base de données PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: loganalyzer-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-network

  # Backend Flask
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loganalyzer-backend
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/instance:/app/instance
      - ./backend/static/reports:/app/static/reports
    networks:
      - backend-network
      - frontend-network
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # Frontend Angular + Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: loganalyzer-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - frontend-network

networks:
  backend-network:
    internal: true
  frontend-network:

volumes:
  postgres_data:
