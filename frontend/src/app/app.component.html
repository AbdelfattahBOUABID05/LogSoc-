<div class="soc-container min-h-screen bg-slate-50 dark:bg-[#020617] transition-colors duration-500">
  <!-- SIDEBAR (Conditionnelle) -->
  <app-sidebar *ngIf="shouldShowLayout()" class="hidden lg:block w-72 h-screen fixed left-0 top-0 z-50"></app-sidebar>

  <div [class.lg:ml-72]="shouldShowLayout()" class="flex flex-col min-h-screen relative">
    <!-- HEADER GLOBAL CENTRALISÉ (Conditionnel) -->
    <header *ngIf="shouldShowLayout()" class="soc-header-global">
      <div class="header-content">
        <div class="flex items-center gap-4 mb-1">
          <div class="soc-header-icon-box">
            <mat-icon>{{ pageIcon }}</mat-icon>
          </div>
          <h1 class="soc-main-title">{{ pageTitle }}</h1>
        </div>
        <p class="soc-header-subtitle">{{ pageSubtitle }}</p>
      </div>

      <div class="flex items-center gap-4">
        <!-- Theme Toggle -->
        <button (click)="themeService.toggleTheme()" class="soc-header-action-btn" title="Changer le thème">
          <mat-icon [class.text-amber-500]="!isDark()" [class.text-indigo-400]="isDark()">
            {{ isDark() ? 'dark_mode' : 'light_mode' }}
          </mat-icon>
        </button>

        <!-- Notifications -->
        <div class="relative">
          <button (click)="toggleNotifications()" class="soc-header-action-btn relative" title="Notifications">
            <mat-icon>notifications</mat-icon>
            <span *ngIf="unreadCount > 0" class="absolute top-3 right-3 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white dark:border-[#020617] animate-ping"></span>
            <span *ngIf="unreadCount > 0" class="absolute top-3 right-3 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white dark:border-[#020617]"></span>
          </button>

          <!-- Dropdown Notifications -->
          <div *ngIf="showNotifications" class="absolute right-0 mt-4 w-80 bg-white/95 dark:bg-[#020617]/95 border border-slate-200 dark:border-white/10 rounded-2xl z-50 overflow-hidden backdrop-blur-2xl animate-slide-up notification-dropdown-shadow">
            <div class="p-5 border-b border-slate-100 dark:border-white/5 flex justify-between items-center bg-slate-50/50 dark:bg-white/5">
              <h4 class="text-[10px] font-black uppercase tracking-widest text-slate-500 dark:text-white/30">Centre d'Observabilité</h4>
              <span class="px-2 py-1 bg-indigo-500/10 text-indigo-500 dark:bg-[#00f2ff]/20 dark:text-[#00f2ff] text-[9px] font-black rounded-lg border border-indigo-500/20 dark:border-[#00f2ff]/30">{{ unreadCount }} nouveaux</span>
            </div>
            <div class="max-h-[400px] overflow-y-auto custom-scrollbar">
              <div *ngFor="let n of notifications" (click)="onNotificationClick(n)" class="p-5 border-b border-slate-100 dark:border-white/5 hover:bg-slate-50 dark:hover:bg-white/5 transition-all cursor-pointer relative group" [class.notification-unread-bg]="!n.is_read">
                <div *ngIf="!n.is_read" class="absolute left-0 top-0 bottom-0 w-1 bg-indigo-600 dark:bg-[#00f2ff] notification-indicator-shadow"></div>
                <p class="text-xs font-black text-slate-900 dark:text-white mb-1 group-hover:text-indigo-600 dark:group-hover:text-[#00f2ff] transition-colors">{{ n.title }}</p>
                <p class="text-[10px] text-slate-500 dark:text-white/50 leading-relaxed">{{ n.message }}</p>
                <div class="flex justify-between items-center mt-3">
                  <span class="text-[8px] text-slate-400 dark:text-white/30 uppercase font-black tracking-widest">{{ n.created_at | date:'HH:mm' }}</span>
                </div>
              </div>
              <div *ngIf="notifications.length === 0" class="p-10 text-center flex flex-col items-center gap-3">
                <mat-icon class="text-slate-200 dark:text-white/10 text-4xl h-10 w-10">check_circle</mat-icon>
                <p class="text-[10px] text-slate-400 dark:text-white/30 italic">Tout est sous contrôle</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- CONTENU DYNAMIQUE -->
    <main class="flex-1 overflow-auto" [class.p-6]="shouldShowLayout()" [class.lg:p-10]="shouldShowLayout()">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
