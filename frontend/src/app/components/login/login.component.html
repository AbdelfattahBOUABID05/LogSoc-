<div class="login-container min-h-screen flex items-center justify-center p-4">
  <!-- Top Branding Logos -->
  <div class="absolute top-8 left-8 hidden md:block">
    <img src="assets/img/logo.png" alt="LogSOC Logo" class="h-20 object-contain theme-aware-logo scale-125 dark:invert" priority>
  </div>
  <div class="absolute top-8 right-8 hidden md:block">
    <img src="assets/img/logo-awb.png" alt="AWB Logo" class="h-20 object-contain theme-aware-logo scale-125 dark:invert" priority>
  </div>

  <!-- Theme Toggle Integration -->
  <div class="absolute top-8 left-1/2 -translate-x-1/2 z-50">
    <button (click)="toggleTheme()" 
            class="theme-toggle-btn group"
            [matTooltip]="isDark() ? 'Passer au mode clair' : 'Passer au mode sombre'">
      <mat-icon [class.text-amber-500]="!isDark()" [class.text-indigo-400]="isDark()">
        {{ isDark() ? 'dark_mode' : 'light_mode' }}
      </mat-icon>
    </button>
  </div>

  <div class="glass-card login-card w-full max-w-md overflow-hidden relative">
    <!-- Top Decorative Bar -->
    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-indigo-500 to-transparent opacity-50"></div>

    <div class="p-8 md:p-12">
      <!-- Mobile Logos -->
      <div class="flex justify-between items-center mb-10 md:hidden">
        <img src="assets/img/logo.png" alt="LogSOC Logo" class="h-12 object-contain theme-aware-logo dark:invert">
        <img src="assets/img/logo-awb.png" alt="AWB Logo" class="h-12 object-contain theme-aware-logo dark:invert">
      </div>

      <!-- Header -->
      <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-indigo-500/10 border border-indigo-500/20 mb-4 shadow-[0_0_25px_rgba(99,102,241,0.2)]">
          <mat-icon class="text-indigo-500 text-4xl h-10 w-10">shield</mat-icon>
        </div>
        <h2 class="text-3xl font-black tracking-tighter uppercase mb-1">ACCÈS <span class="text-indigo-500">SOC</span></h2>
        <p class="text-[10px] font-bold text-slate-500 tracking-[0.4em] uppercase">Authentification Centre de Commande</p>
      </div>

      <!-- Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <!-- Error Message -->
        <div *ngIf="errorMessage" class="p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-500 text-xs font-bold flex items-center gap-3 animate-shake">
          <mat-icon class="text-sm">error_outline</mat-icon>
          {{ errorMessage }}
        </div>

        <!-- Username -->
        <div class="space-y-2">
          <label class="input-label">Utilisateur</label>
          <div class="input-wrapper group">
            <mat-icon class="input-icon">person_outline</mat-icon>
            <input type="text" 
                   formControlName="username" 
                   placeholder="Identifiant SOC"
                   class="soc-input">
          </div>
        </div>

        <!-- Password -->
        <div class="space-y-2">
          <div class="flex justify-between items-center">
            <label class="input-label">Clé d'accès</label>
            <a href="javascript:void(0)" class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest hover:underline">Oublié ?</a>
          </div>
          <div class="input-wrapper group">
            <mat-icon class="input-icon">lock_outline</mat-icon>
            <input [type]="showPassword ? 'text' : 'password'" 
                   formControlName="password" 
                   placeholder="••••••••"
                   class="soc-input">
            <button type="button" (click)="togglePassword()" class="password-toggle">
              <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" 
                [disabled]="loginForm.invalid || loading"
                class="submit-btn group">
          <span *ngIf="!loading" class="flex items-center justify-center gap-3">
            INITIALISER SESSION
            <mat-icon class="text-sm transition-transform group-hover:translate-x-1">power_settings_new</mat-icon>
          </span>
          <div *ngIf="loading" class="flex items-center justify-center gap-3">
            <div class="w-4 h-4 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
            SYNCHRONISATION...
          </div>
        </button>
      </form>

      <!-- Footer Branding -->
      <div class="mt-12 pt-8 border-t border-white/5 flex flex-col items-center gap-6">
        <p class="text-[9px] font-black text-slate-500 tracking-[0.3em] uppercase text-center leading-relaxed">
          Projet de Fin d'Études • Direction ISITW<br>
          <span class="text-slate-400/50">LogAnalyzer SOC</span>
        </p>
        <div class="flex items-center gap-4 grayscale opacity-40 hover:grayscale-0 hover:opacity-100 transition-all duration-700 cursor-default">
          <img src="assets/img/logo-awb.png" alt="AWB" class="h-8 object-contain theme-aware-logo dark:invert">
          <div class="w-px h-6 bg-white/10"></div>
          <span class="text-[11px] font-black text-slate-500 tracking-wider">Attijariwafa Bank</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Background Decorative Glows -->
  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>
</div>
