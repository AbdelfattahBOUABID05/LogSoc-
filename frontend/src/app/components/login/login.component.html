<div class="split-container min-h-screen flex items-center justify-center">
  <div class="login-wrapper shadow-2xl overflow-hidden flex flex-col md:flex-row">
    
    <!-- Left Column (Visual Side - 40%) -->
    <div class="visual-side hidden md:flex md:w-[40%] relative overflow-hidden items-center justify-center">
      <div class="geometric-bg"></div>
      <!-- Logo or Branding on visual side if needed, but the prompt says form side -->
    </div>

    <!-- Right Column (Form Side - 60% width) -->
    <div class="form-side w-full md:w-[60%] bg-white p-8 md:p-12 flex flex-col items-center justify-center relative">
      
      <!-- Theme Toggle (Keeping it accessible) -->
      <div class="absolute top-4 right-4">
        <button (click)="toggleTheme()" 
                class="p-2 rounded-full hover:bg-gray-100 transition-colors"
                [matTooltip]="isDark() ? 'Mode Clair' : 'Mode Sombre'">
          <mat-icon [class.text-amber-500]="!isDark()" [class.text-indigo-400]="isDark()">
            {{ isDark() ? 'dark_mode' : 'light_mode' }}
          </mat-icon>
        </button>
      </div>

      <!-- Header Content -->
      <div class="text-center mb-10">
        <div class="shield-logo mb-6">
          <img src="assets/img/logo.png" alt="LogSOC Logo" class="h-24 w-auto object-contain drop-shadow-lg">
        </div>
      </div>

      <!-- Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="w-full flex justify-center">
        <div class="form-content-wrapper w-full max-w-[380px] space-y-6">
          <!-- Error Message -->
          <div *ngIf="errorMessage" class="p-3 rounded-lg bg-red-50 border border-red-200 text-red-600 text-xs font-medium flex items-center gap-2 animate-shake">
            <mat-icon class="text-sm">error_outline</mat-icon>
            {{ errorMessage }}
          </div>

          <!-- Email Field -->
          <div class="input-group relative">
            <mat-icon class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl">person_outline</mat-icon>
            <input type="text" 
                   formControlName="username" 
                   placeholder="Email"
                   class="minimal-input w-full">
          </div>

          <!-- Password Field -->
          <div class="input-group relative">
            <mat-icon class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl">lock_outline</mat-icon>
            <input [type]="showPassword ? 'text' : 'password'" 
                   formControlName="password" 
                   placeholder="Password"
                   class="minimal-input w-full">
            <button type="button" (click)="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <mat-icon class="text-xl">{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </div>

          <!-- Forgot Password -->
          <div class="flex justify-start">
            <a href="javascript:void(0)" class="text-xs font-medium text-gray-400 hover:text-[#002d72] transition-colors">Forgot Password?</a>
          </div>

          <!-- Submit Button -->
          <div class="pt-2">
            <button type="submit" 
                    [disabled]="loginForm.invalid || loading"
                    class="login-btn bg-[#002d72] text-white w-full py-3.5 rounded-lg font-bold tracking-widest hover:bg-[#003d99] transition-all transform disabled:opacity-50 flex items-center justify-center">
              <span *ngIf="!loading">LOGIN</span>
              <div *ngIf="loading" class="w-5 h-5 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
            </button>
          </div>
        </div>
      </form>

      <!-- Logo Section at Bottom (Optional, but user mentioned shields/logo at top center) -->
      <div class="mt-12 flex items-center gap-3 grayscale opacity-30">
        <img src="assets/img/logo-awb.png" alt="AWB" class="h-6 object-contain">
        <div class="w-px h-4 bg-gray-300"></div>
        <span class="text-[10px] font-bold text-gray-500 tracking-wider">LogSOC Enterprise</span>
      </div>
    </div>
  </div>
</div>
