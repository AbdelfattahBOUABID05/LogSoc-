<div *ngIf="isLoading" class="fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-slate-950/95 backdrop-blur-xl transition-opacity duration-500">
  <div class="flex flex-col items-center gap-8 animate-fade-in">
    <!-- Logo Container -->
    <div class="relative">
      <img 
        src="assets\img\logo-awb.png" 
        alt="Attijariwafa Bank Logo" 
        class="w-64 h-auto object-contain animate-pulse-glow"
      >
    </div>

    <!-- Loading Indicator -->
    <div class="flex items-center gap-2">
      <div class="w-3 h-3 bg-gradient-to-r from-red-600 to-red-500 rounded-full animate-bounce" style="animation-delay: 0ms;"></div>
      <div class="w-3 h-3 bg-gradient-to-r from-red-600 to-red-500 rounded-full animate-bounce" style="animation-delay: 150ms;"></div>
      <div class="w-3 h-3 bg-gradient-to-r from-red-600 to-red-500 rounded-full animate-bounce" style="animation-delay: 300ms;"></div>
    </div>

    <!-- Transition Text -->
    <p class="text-sm font-medium text-slate-400 uppercase tracking-[0.3em]">Chargement en cours...</p>
  </div>
</div>
