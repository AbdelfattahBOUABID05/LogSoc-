<div class="flex min-h-screen bg-[#f0f2f5] dark:bg-[#0a192f] transition-colors duration-500">
  <app-sidebar></app-sidebar>

  <main class="flex-1 ml-64 pt-24 pb-8 px-12 mx-auto h-full">
    <div class="w-full">
      <header class="mb-10 animate-fade-in">
        <div class="flex items-center gap-4">
          <div class="icon-box-indigo">
            <i class="fas fa-cog text-2xl text-indigo-500"></i>
          </div>
          <div>
            <h2 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight uppercase italic">
              Paramètres <span class="text-indigo-500 not-italic">Système</span>
            </h2>
            <p class="text-slate-500 dark:text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mt-1">Préférences de notification & Configuration SOC</p>
          </div>
        </div>
      </header>

      <div class="jobs-wrapper-card p-10 space-y-12 animate-slide-up">
        <!-- Section 1: Identité de Messagerie -->
        <div class="space-y-8">
          <div class="flex items-center gap-4 pb-4 border-b border-slate-200 dark:border-white/5">
            <h3 class="font-black text-[10px] uppercase tracking-[0.3em] text-slate-500 dark:text-white/30">Identité de Messagerie SOC</h3>
          </div>

          <div class="p-8 bg-slate-50/50 dark:bg-white/5 border border-slate-200/50 dark:border-white/10 rounded-[24px] flex items-center gap-8 group">
            <div class="w-20 h-20 bg-indigo-500/10 rounded-3xl flex items-center justify-center border border-indigo-500/20 shadow-xl shadow-indigo-500/5">
              <i class="fas fa-paper-plane text-3xl text-indigo-500"></i>
            </div>
            <div>
              <label class="text-[10px] font-black text-slate-500 dark:text-white/30 uppercase tracking-widest block mb-2">Adresse d'expédition expert</label>
              <p class="text-2xl font-black text-slate-900 dark:text-white italic tracking-tight">{{ username }}&#64;awb.pfe.ma</p>
              <div class="mt-3 flex items-center gap-2">
                <i class="fas fa-check-circle text-emerald-500 text-xs"></i>
                <span class="text-[10px] text-emerald-600 dark:text-emerald-500/60 font-black uppercase tracking-widest">Relais SOC Certifié</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Section 2: SMTP Configuration -->
        <div class="space-y-8">
          <div class="flex items-center justify-between pb-4 border-b border-slate-200 dark:border-white/5">
            <h3 class="font-black text-[10px] uppercase tracking-[0.3em] text-slate-500 dark:text-white/30">Serveur SMTP Personnel</h3>
            <button (click)="showAdvanced = !showAdvanced" 
                    class="px-5 py-2.5 bg-indigo-500/10 hover:bg-indigo-500/20 text-indigo-500 rounded-xl transition-all text-[10px] font-black uppercase tracking-widest border border-indigo-500/20 flex items-center gap-2">
              <i class="fas" [class.fa-cog]="!showAdvanced" [class.fa-chevron-up]="showAdvanced"></i>
              {{ showAdvanced ? 'Masquer les réglages' : 'Configurer' }}
            </button>
          </div>

          <div *ngIf="showAdvanced" class="glass-smtp-panel space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
              <div class="md:col-span-2 space-y-3">
                <label class="block text-[10px] font-black text-slate-500 dark:text-white/30 uppercase tracking-[0.2em] ml-1">Serveur SMTP</label>
                <div class="relative group/input">
                  <i class="fas fa-server absolute left-5 top-5 text-slate-400 group-focus-within/input:text-indigo-500 transition-colors"></i>
                  <input type="text" [(ngModel)]="settings.smtpServer" class="input-soc-floating" placeholder="smtp.gmail.com">
                </div>
              </div>
              <div class="space-y-3">
                <label class="block text-[10px] font-black text-slate-500 dark:text-white/30 uppercase tracking-[0.2em] ml-1">Port</label>
                <div class="relative group/input">
                  <i class="fas fa-door-open absolute left-5 top-5 text-slate-400 group-focus-within/input:text-indigo-500 transition-colors"></i>
                  <input type="number" [(ngModel)]="settings.smtpPort" class="input-soc-floating" placeholder="587">
                </div>
              </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
              <div class="space-y-3">
                <label class="block text-[10px] font-black text-slate-500 dark:text-white/30 uppercase tracking-[0.2em] ml-1">Utilisateur SMTP</label>
                <div class="relative group/input">
                  <i class="fas fa-user-shield absolute left-5 top-5 text-slate-400 group-focus-within/input:text-indigo-500 transition-colors"></i>
                  <input type="text" [(ngModel)]="settings.smtpUser" class="input-soc-floating" placeholder="expert@domain.com">
                </div>
              </div>
              <div class="space-y-3">
                <label class="block text-[10px] font-black text-slate-500 dark:text-white/30 uppercase tracking-[0.2em] ml-1">Mot de passe SMTP</label>
                <div class="relative group/input">
                  <i class="fas fa-key absolute left-5 top-5 text-slate-400 group-focus-within/input:text-indigo-500 transition-colors"></i>
                  <input type="password" [(ngModel)]="settings.smtpPassword" class="input-soc-floating" placeholder="••••••••">
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Section 3: Alertes & Notifications -->
        <div class="space-y-8">
          <div class="flex items-center gap-4 pb-4 border-b border-slate-200 dark:border-white/5">
            <h3 class="font-black text-[10px] uppercase tracking-[0.3em] text-slate-500 dark:text-white/30">Alertes & Notifications</h3>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="neon-toggle-container">
              <label class="neon-toggle">
                <input type="checkbox" [(ngModel)]="settings.emailNotifications" class="sr-only">
                <div class="neon-toggle-bg"></div>
                <div class="neon-toggle-dot shadow-indigo-500/50"></div>
              </label>
              <div>
                <span class="text-xs font-black text-slate-900 dark:text-white uppercase tracking-wider block">Notifications Email</span>
                <span class="text-[10px] text-slate-500 font-medium uppercase tracking-widest">Rapports critiques & Audits</span>
              </div>
            </div>

            <div class="space-y-3">
              <label class="block text-[10px] font-black text-slate-500 dark:text-white/30 uppercase tracking-[0.2em] ml-1">Email de destination</label>
              <div class="relative group/input">
                <i class="fas fa-envelope-open-text absolute left-5 top-5 text-slate-400 group-focus-within/input:text-indigo-500 transition-colors"></i>
                <input type="email" [(ngModel)]="settings.notificationEmail" class="input-soc-floating" placeholder="admin@soc-center.ma">
              </div>
            </div>
          </div>
        </div>

        <!-- Save Button -->
        <div class="pt-6 border-t border-slate-200 dark:border-white/5">
          <button (click)="saveSettings()" [disabled]="loading" class="btn-indigo-gradient w-full md:w-auto md:min-w-[300px]">
            <i class="fas" [class.fa-save]="!loading" [class.fa-spinner]="loading" [class.fa-spin]="loading"></i>
            {{ loading ? 'Sauvegarde...' : 'Enregistrer les paramètres' }}
          </button>
        </div>
      </div>
    </div>
  </main>
</div>
