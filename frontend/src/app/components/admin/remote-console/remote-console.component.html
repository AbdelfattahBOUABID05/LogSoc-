<div class="flex-1 grid grid-cols-12 gap-8 overflow-y-auto">
  <!-- Connection Panel -->
  <div class="col-span-12 lg:col-span-3 space-y-6 flex flex-col overflow-y-auto pr-2">
    <div class="glass-card p-8 relative group border-l-4 border-indigo-600">
      <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-500/5 rounded-full blur-2xl -mr-16 -mt-16 transition-all duration-700 group-hover:bg-indigo-500/10"></div>
      
      <h3 class="font-black text-slate-900 dark:text-white/60 text-[10px] uppercase tracking-[0.3em] mb-8">Authentification SSH</h3>
      
      <div class="space-y-6 relative z-10">
        <div class="space-y-2">
          <label class="block text-[9px] font-black text-slate-500 dark:text-white/20 uppercase tracking-widest ml-1">Hôte (IP)</label>
          <input type="text" [(ngModel)]="ssh().host" 
                 class="w-full bg-slate-100/50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-xs font-bold focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all text-indigo-900 dark:text-white placeholder-slate-400 dark:placeholder-white/10">
        </div>

        <div class="space-y-2">
          <label class="block text-[9px] font-black text-slate-500 dark:text-white/20 uppercase tracking-widest ml-1">Utilisateur</label>
          <input type="text" [(ngModel)]="ssh().username" 
                 class="w-full bg-slate-100/50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-xs font-bold focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all text-indigo-900 dark:text-white placeholder-slate-400 dark:placeholder-white/10">
        </div>

        <div class="space-y-2">
          <label class="block text-[9px] font-black text-slate-500 dark:text-white/20 uppercase tracking-widest ml-1">Mot de passe</label>
          <div class="relative group/input">
            <input type="password" [(ngModel)]="ssh().password" 
                   class="w-full bg-slate-100/50 dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-xs font-bold focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all text-indigo-900 dark:text-white placeholder-slate-400 dark:placeholder-white/10 min-h-[45px]">
          </div>
        </div>
      </div>

      <div class="pt-8 relative z-10">
        <button (click)="clearConsole()" 
                class="w-full px-4 py-4 bg-slate-100 dark:bg-white/5 hover:bg-red-500 hover:text-white border border-slate-200 dark:border-white/10 rounded-xl transition-all duration-300 text-[10px] font-black uppercase tracking-widest text-slate-500 dark:text-white/40">
          Effacer Console
        </button>
      </div>
    </div>

    <!-- Quick Connect List -->
    <div *ngIf="recentConnections().length > 0" class="glass-card p-8 flex-1">
      <div class="flex items-center justify-between mb-6">
        <h3 class="font-black text-slate-900 dark:text-white/60 text-[10px] uppercase tracking-[0.3em]">Historique</h3>
        <i class="fas fa-history text-indigo-500 text-xs"></i>
      </div>
      <div class="space-y-3">
        <button *ngFor="let conn of recentConnections()" 
                (click)="fillForm(conn)"
                class="w-full text-left p-4 rounded-xl bg-slate-50 dark:bg-white/5 border border-transparent hover:border-indigo-500/30 hover:bg-white dark:hover:bg-white/10 transition-all group relative overflow-hidden">
          <div class="absolute left-0 top-0 w-1 h-0 bg-indigo-500 group-hover:h-full transition-all"></div>
          <div class="text-[11px] font-black text-slate-900 dark:text-white group-hover:text-indigo-500 transition-colors truncate">{{ conn.host }}</div>
          <div class="text-[9px] text-slate-400 dark:text-white/20 font-black uppercase tracking-widest mt-1 truncate">{{ conn.username }}</div>
        </button>
      </div>
    </div>
  </div>

  <!-- Terminal Interactive Section -->
  <div class="col-span-12 lg:col-span-9 terminal-container group">
    <div class="terminal-header">
      <div class="flex items-center gap-4">
        <div class="flex gap-1.5">
          <div class="w-2.5 h-2.5 rounded-full bg-red-500/80"></div>
          <div class="w-2.5 h-2.5 rounded-full bg-yellow-500/80"></div>
          <div class="w-2.5 h-2.5 rounded-full bg-green-500/80"></div>
        </div>
        <span class="text-[10px] font-black tracking-widest text-slate-400 uppercase">SOC_TERMINAL_V2.0 // {{ currentConnection?.host || 'ROOT' }}</span>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-[9px] font-black text-emerald-500 animate-pulse uppercase tracking-widest">● Link Active</span>
      </div>
    </div>

    <div class="terminal-body" #terminalBody>
      <!-- History -->
      <div *ngFor="let entry of history()" class="terminal-line">
        <div class="terminal-prompt">root&#64;{{ currentConnection?.host || 'soc' }}:~$ {{ entry.command }}</div>
        <div class="terminal-output">{{ entry.output }}</div>
      </div>

      <!-- Current Input Row -->
      <div class="terminal-line">
        <div class="flex items-center gap-3">
          <span class="terminal-prompt shrink-0">root&#64;{{ currentConnection?.host || 'soc' }}:~$</span>
          <input #cmdInput type="text" [(ngModel)]="commandInput" (keyup.enter)="sendCommand()" 
                 [disabled]="isExecuting()"
                 class="flex-1 bg-transparent border-none outline-none text-[#00f2ff] font-mono text-[13px]" 
                 autofocus>
        </div>
      </div>
      
      <div *ngIf="isExecuting()" class="terminal-line animate-pulse">
        <span class="text-indigo-500">Exécution en cours...</span>
      </div>
    </div>
  </div>
</div>
